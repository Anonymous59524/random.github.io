<!DOCTYPE html>
<html>
<head>
<title>Viewer</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

video{
width:80%;
margin-top:30px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>Waiting for camera...</h2>

<video id="video" autoplay playsinline></video>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

const video = document.getElementById("video")

const peer = new Peer("viewer-room")

peer.on("open", id=>{
console.log("viewer ready")
})

peer.on("call", call => {

call.answer()

call.on("stream", stream=>{
video.srcObject = stream
})

})

</script>

</body>
</html>
